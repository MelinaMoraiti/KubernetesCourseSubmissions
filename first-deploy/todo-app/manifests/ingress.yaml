apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dwk-material-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todoapp-svc
                port:
                  number: 2425

          - path: /current-status
            pathType: Prefix
            backend:
              service:
                name: logoutput-svc
                port:
                  number: 2345